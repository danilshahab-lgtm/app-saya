<!DOCTYPE html>
<html>
<head>
  <title>App Saya</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
    }

    .container {
      padding-bottom: 70px;
    }

    /* NAVBAR */
    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 60px;
      background: #111;
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 1px solid #333;
    }

    .nav button {
      background: none;
      border: none;
      color: white;
      font-size: 16px;
    }

    .nav button:hover {
      color: red;
    }

    h2 {
      padding: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🏠 Home</h2>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="go('/feed')">🎥 Feed</button>
  <button onclick="go('/upload')">➕ Upload</button>
  <button onclick="go('/profile-page')">👤 Profile</button>
</div>

<script>
function go(url){
  window.location.href = url;
}
</script>

</body>
</html>
