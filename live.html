<h2>LIVE</h2>
<div id="chat"></div>
<input id="msg">
<button onclick="send()">Send</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io();

function send(){
  socket.emit("live_chat",{message:msg.value});
}

socket.on("live_chat",d=>{
  chat.innerHTML+=`<p>${d.message}</p>`;
});
</script>
