<div id="users"></div>
<div id="chat"></div>

<input id="msg">
<button onclick="send()">Send</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io();
let user=localStorage.getItem("username");
let target="";

socket.emit("online",user);

socket.on("online_users",list=>{
  fetch("/users").then(r=>r.json()).then(d=>{
    users.innerHTML=d.map(u=>`
    <div onclick="select('${u.username}')">
    ${u.username} ${list.includes(u.username)?"🟢":""}
    </div>`).join("");
  });
});

function select(u){target=u;}

function send(){
  socket.emit("private_chat",{from:user,to:target,message:msg.value});
}

socket.on("private_chat",d=>{
  chat.innerHTML+=`<p>${d.from}: ${d.message}</p>`;
});
</script>
