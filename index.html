<!DOCTYPE html>
<html>
<head>
<script src="https://app.sandbox.midtrans.com/snap/snap.js" data-client-key="Mid-client-7jJlFUtMYaWQfKPa"></script>
</head>

<body style="background:black;color:white;text-align:center">

<h2>🔥 HOME</h2>

<p id="coin"></p>

<button onclick="topup()">💰 Topup</button>

<hr>

<button onclick="go('/chat')">💬 Chat</button>
<button onclick="go('/live')">🔴 Live</button>

<script>
async function load(){
  let res = await fetch("/profile");
  let user = await res.json();
  document.getElementById("coin").innerText = "Coin: " + user.coins;
}
load();

async function topup(){
  let res = await fetch("/payment",{method:"POST"});
  let data = await res.json();

  window.snap.pay(data.token,{
    onSuccess: async function(){
      await fetch("/topup-success",{method:"POST"});
      alert("Topup berhasil");
      location.reload();
    }
  });
}

function go(url){
  location.href = url;
}
</script>

</body>
</html>
