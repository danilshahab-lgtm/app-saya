<!DOCTYPE html>
<html>
<body>

<h2>Login</h2>

<input id="username" placeholder="Masukkan nama">
<button onclick="login()">Masuk</button>

<script>
function login(){
  let username = document.getElementById("username").value;
  localStorage.setItem("username", username);
  window.location.href = "/";
}
</script>

</body>
</html>
