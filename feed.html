<body style="margin:0;background:black;overflow-y:scroll;scroll-snap-type:y mandatory">

<div id="feed"></div>

<script>
fetch("/videos").then(r=>r.json()).then(data=>{
  data.forEach(v=>{
    feed.innerHTML+=`
    <div style="height:100vh;scroll-snap-align:start;position:relative">
      <video src="/uploads/${v.filename}" autoplay loop muted
      style="width:100%;height:100%;object-fit:cover"></video>

      <div style="position:absolute;bottom:20px;left:10px">
        ❤️ Like <br> 💬 Comment
      </div>
    </div>`;
  });
});
</script>
